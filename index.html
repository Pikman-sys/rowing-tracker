<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rowing Stroke Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0c2340 0%, #1a4a7a 50%, #0c2340 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 24px;
    }

    /* Subtle animated water ripple behind the card */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 20% 60%, rgba(100,180,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 80% 30%, rgba(100,180,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 44px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      position: relative;
    }

    /* Water-line accent stripe at top of card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 20px 20px 0 0;
      background: linear-gradient(90deg, #1a6fa8, #4db6e8, #1a6fa8);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 14px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0c2340;
      letter-spacing: -0.3px;
    }

    .logo p {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    .date-badge {
      background: #ebf5fb;
      border: 1px solid #93c6e0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #1a4a7a;
      font-weight: 600;
      text-align: center;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      color: #111827;
      background: #f9fafb;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      outline: none;
      margin-bottom: 20px;
    }

    input:focus {
      border-color: #1a6fa8;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(26, 111, 168, 0.12);
    }

    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: 1; }

    button {
      width: 100%;
      padding: 14px;
      background: #1a6fa8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    button:hover  { background: #155a8a; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

    .message {
      margin-top: 18px;
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      display: none;
    }

    .message.success {
      background: #eff8ff;
      border: 1px solid #93c6e0;
      color: #0c3d5e;
    }

    .message.error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .config-notice {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: #92400e;
      margin-bottom: 22px;
      text-align: center;
      display: none;
    }

    /* ── Chart card ─────────────────────────────────────────────── */
    .chart-card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 36px 32px;
      width: 100%;
      max-width: 720px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      position: relative;
    }

    .chart-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 20px 20px 0 0;
      background: linear-gradient(90deg, #1a6fa8, #4db6e8, #1a6fa8);
    }

    .chart-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chart-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #0c2340;
    }

    .chart-header p {
      font-size: 12px;
      color: #9ca3af;
    }

    .chart-wrap {
      position: relative;
      height: 280px;
    }

    .chart-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 280px;
      color: #9ca3af;
      font-size: 14px;
      gap: 10px;
    }

    .chart-loading .spinner {
      border-color: rgba(26,111,168,0.3);
      border-top-color: #1a6fa8;
    }

    .chart-empty {
      display: none;
      align-items: center;
      justify-content: center;
      height: 280px;
      color: #9ca3af;
      font-size: 14px;
      text-align: center;
      flex-direction: column;
      gap: 8px;
    }

    .refresh-btn {
      width: auto;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- ── Entry form card (unchanged) ──────────────────────────── -->
  <div class="card">
    <div class="logo">
      <img src="logo.png" alt="Portishead PGC" class="logo-img" />
      <h1>Rowing Stroke Tracker</h1>
      <p>Log your daily stroke count</p>
    </div>

    <div class="date-badge" id="dateBadge">Loading date…</div>

    <div class="config-notice" id="configNotice">
      ⚠️ Apps Script URL not configured. See setup instructions.
    </div>

    <form id="scoreForm">
      <label for="nameInput">Your Name</label>
      <input
        type="text"
        id="nameInput"
        name="name"
        placeholder="e.g. Jon Wilde"
        autocomplete="name"
        required
      />

      <label for="strokeInput">Stroke Count</label>
      <input
        type="number"
        id="strokeInput"
        name="strokes"
        placeholder="e.g. 5420"
        min="1"
        max="100000"
        required
      />

      <button type="submit" id="submitBtn">Log Strokes</button>
    </form>

    <div class="message" id="message"></div>
  </div>

  <!-- ── Chart card ────────────────────────────────────────────── -->
  <div class="chart-card">
    <div class="chart-header">
      <h2>📊 Stroke Count Over Time</h2>
      <p id="chartUpdated"></p>
    </div>

    <div id="chartLoading" class="chart-loading">
      <span class="spinner"></span> Loading chart data…
    </div>

    <div id="chartEmpty" class="chart-empty">
      <span style="font-size:32px">🚣</span>
      No data yet — log the first stroke count above!
    </div>

    <div class="chart-wrap" id="chartWrap" style="display:none">
      <canvas id="strokeChart"></canvas>
    </div>

    <button class="refresh-btn" id="refreshBtn" onclick="loadChart()" style="display:none">
      ↻ Refresh chart
    </button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    // ─────────────────────────────────────────────────────────────────
    // CONFIGURATION
    // ─────────────────────────────────────────────────────────────────
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzCD1cxP8hblqII5L_chChzwaYcylW0LF7gRY3CH3vitMIQzprZZuP1hlJOOCA_PsI9Fw/exec';
    const SHEET_ID        = '17Pk8Da9cpYCF9zkm9UbiLkTTAs70f7vxmre5JqAKvZM';
    // ─────────────────────────────────────────────────────────────────

    // Colour palette for rowers (cycles if more than 7)
    const PALETTE = [
      '#1a6fa8', '#e85d04', '#2ec4b6', '#9b5de5',
      '#f72585', '#06d6a0', '#ffd166'
    ];

    const form       = document.getElementById('scoreForm');
    const submitBtn  = document.getElementById('submitBtn');
    const msgBox     = document.getElementById('message');
    const dateBadge  = document.getElementById('dateBadge');
    const notice     = document.getElementById('configNotice');

    // Display today's date
    const today = new Date();
    const formatted = today.toLocaleDateString('en-GB', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
    dateBadge.textContent = '📅 ' + formatted;

    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      notice.style.display = 'block';
    }

    function showMessage(type, text) {
      msgBox.className = 'message ' + type;
      msgBox.textContent = text;
      msgBox.style.display = 'block';
    }

    // ── Form submission ───────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
        showMessage('error', 'Please configure the Apps Script URL first.');
        return;
      }

      const name    = document.getElementById('nameInput').value.trim();
      const strokes = parseInt(document.getElementById('strokeInput').value, 10);

      if (!name) { showMessage('error', 'Please enter your name.'); return; }
      if (isNaN(strokes) || strokes < 1) { showMessage('error', 'Please enter a valid stroke count.'); return; }

      const dateStr = today.toLocaleDateString('en-GB', {
        day: '2-digit', month: '2-digit', year: 'numeric'
      });

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Saving…';
      msgBox.style.display = 'none';

      try {
        // GET + no-cors: query params survive Google's redirect (POST body doesn't).
        const params = new URLSearchParams({ action: 'saveScore', name, strokes, date: dateStr });
        await fetch(`${APPS_SCRIPT_URL}?${params}`, { method: 'GET', mode: 'no-cors' });

        showMessage('success', `🚣 Logged! ${name} — ${strokes.toLocaleString()} strokes on ${dateStr}`);
        form.reset();
        // Reload chart after a short delay so the sheet has time to update
        setTimeout(loadChart, 2500);
      } catch (err) {
        showMessage('error', 'Could not reach the server. Check your connection and URL.');
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Log Strokes';
      }
    });

    // ── Chart ─────────────────────────────────────────────────────
    let chartInstance = null;

    // Simple CSV parser that handles quoted fields
    function parseCSV(text) {
      return text.trim().split('\n').map(line => {
        const row = []; let cell = ''; let inQuote = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') { inQuote = !inQuote; }
          else if (ch === ',' && !inQuote) { row.push(cell.trim()); cell = ''; }
          else { cell += ch; }
        }
        row.push(cell.trim());
        return row;
      });
    }

    async function loadChart() {
      document.getElementById('chartLoading').style.display = 'flex';
      document.getElementById('chartWrap').style.display    = 'none';
      document.getElementById('chartEmpty').style.display   = 'none';
      document.getElementById('refreshBtn').style.display   = 'none';
      document.getElementById('chartUpdated').textContent   = '';

      try {
        // Fetch the sheet directly as CSV — no Apps Script, no CORS issues.
        // Requires the spreadsheet to be shared as "Anyone with link can view".
        const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
        const res    = await fetch(csvUrl);
        if (!res.ok) throw new Error('Sheet not publicly accessible');
        const rows = parseCSV(await res.text());

        // Convert CSV rows into the same {dates, rowers} shape as before
        if (rows.length < 2 || rows[0].length < 2) {
          document.getElementById('chartLoading').style.display = 'none';
          document.getElementById('chartEmpty').style.display   = 'flex';
          return;
        }
        const headers = rows[0];
        const dates   = headers.slice(1).filter(d => d);
        const rowers  = rows.slice(1)
          .filter(r => r[0])
          .map(r => ({
            name:    r[0],
            strokes: r.slice(1, dates.length + 1).map(v => {
              const n = parseFloat(v); return isNaN(n) ? null : n;
            })
          }));

        // Accumulate each rower's strokes over time
        rowers.forEach(rower => {
          let total = 0, started = false;
          rower.strokes = rower.strokes.map(v => {
            if (v !== null) { total += v; started = true; }
            return started ? total : null;
          });
        });

        const data = { dates, rowers };

        document.getElementById('chartLoading').style.display = 'none';

        if (!data.dates || data.dates.length === 0 || !data.rowers || data.rowers.length === 0) {
          document.getElementById('chartEmpty').style.display = 'flex';
          return;
        }

        // Build datasets
        const datasets = data.rowers.map((rower, i) => {
          const colour = PALETTE[i % PALETTE.length];
          return {
            label: rower.name,
            data: rower.strokes,
            borderColor: colour,
            backgroundColor: colour + '22',
            pointBackgroundColor: colour,
            pointRadius: 5,
            pointHoverRadius: 7,
            borderWidth: 2.5,
            tension: 0.3,
            spanGaps: true   // connects across missing days
          };
        });

        document.getElementById('chartWrap').style.display  = 'block';
        document.getElementById('refreshBtn').style.display = 'inline-block';

        const now = new Date();
        document.getElementById('chartUpdated').textContent =
          'Updated ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

        // Destroy previous instance if refreshing
        if (chartInstance) { chartInstance.destroy(); }

        chartInstance = new Chart(
          document.getElementById('strokeChart'),
          {
            type: 'line',
            data: { labels: data.dates, datasets },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: { mode: 'index', intersect: false },
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: {
                    usePointStyle: true,
                    pointStyle: 'circle',
                    padding: 20,
                    font: { size: 12, family: "'Segoe UI', system-ui, sans-serif" }
                  }
                },
                tooltip: {
                  callbacks: {
                    label: ctx => {
                      const v = ctx.parsed.y;
                      return v === null ? null : ` ${ctx.dataset.label}: ${v.toLocaleString()} strokes`;
                    }
                  }
                }
              },
              scales: {
                x: {
                  grid: { color: 'rgba(0,0,0,0.04)' },
                  ticks: { font: { size: 11 }, color: '#6b7280' }
                },
                y: {
                  beginAtZero: false,
                  grid: { color: 'rgba(0,0,0,0.06)' },
                  ticks: {
                    font: { size: 11 },
                    color: '#6b7280',
                    callback: v => v.toLocaleString()
                  }
                }
              }
            }
          }
        );

      } catch (err) {
        document.getElementById('chartLoading').style.display = 'none';
        document.getElementById('chartEmpty').style.display   = 'flex';
        document.getElementById('chartEmpty').innerHTML =
          '<span style="font-size:28px">⚠️</span>Could not load chart data.';
        console.error(err);
      }
    }

    // Load chart on page open
    loadChart();
  </script>
</body>
</html>
